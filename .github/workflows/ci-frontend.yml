name: CI — Frontend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:

  build-and-test:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check frontend exists
        id: check
        run: |
          if [ -f "frontend/web/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Frontend not scaffolded yet — skipping build steps."
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd frontend/web && npm ci

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: cd frontend/web && npm run lint

      - name: Run unit tests
        if: steps.check.outputs.exists == 'true'
        run: cd frontend/web && npm run test -- --no-watch --browsers=ChromeHeadless --code-coverage

      - name: Build production bundle
        if: steps.check.outputs.exists == 'true'
        run: cd frontend/web && npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-frontend
          path: frontend/web/coverage/
          retention-days: 7
