name: FinFlow CI/CD Pipeline

# Si attiva su push al branch main o su pull request
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ══════════════════════════════════
  # JOB 1: Build & Test
  # ══════════════════════════════════
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest

    # Servizi Docker disponibili durante i test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: finflow_secret
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # Cache delle dipendenze Maven

      - name: 🧪 Test Account Service
        run: |
          cd account-service
          ./mvnw test -Dspring.profiles.active=test

      - name: 🧪 Test Transaction Service
        run: |
          cd transaction-service
          ./mvnw test -Dspring.profiles.active=test

      - name: 🧪 Test Notification Service
        run: |
          cd notification-service
          ./mvnw test -Dspring.profiles.active=test

      - name: 📦 Build all services
        run: |
          cd account-service && ./mvnw package -DskipTests
          cd ../transaction-service && ./mvnw package -DskipTests
          cd ../notification-service && ./mvnw package -DskipTests
          cd ../api-gateway && ./mvnw package -DskipTests

      - name: 📊 Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            */target/surefire-reports/
          retention-days: 7

  # ══════════════════════════════════
  # JOB 2: Code Quality (solo su main)
  # ══════════════════════════════════
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Qui potresti aggiungere SonarCloud, Checkstyle, ecc.
      - name: ✅ Verify all modules compile
        run: |
          for service in account-service transaction-service notification-service api-gateway; do
            echo "Verifying $service..."
            cd $service && ./mvnw verify -DskipTests && cd ..
          done
