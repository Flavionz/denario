server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5434/notification_db
    username: finflow
    password: finflow_secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/finflow

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.finflow: DEBUG

finflow:
  rabbitmq:
    queues:
      transaction-created: transaction.created.queue
      # Ascolta gli eventi pubblicati da transaction-service

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-notification:5432/notification_db

  rabbitmq:
    host: rabbitmq

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/finflow
