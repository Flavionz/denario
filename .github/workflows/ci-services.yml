name: CI — Backend Services

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - '.github/workflows/ci-services.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'

jobs:

  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: denario
          POSTGRES_PASSWORD: denario_secret
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: |
          chmod +x services/account-service/mvnw
          chmod +x services/transaction-service/mvnw
          chmod +x services/notification-service/mvnw
          chmod +x services/api-gateway/mvnw

      - name: Test Account Service
        run: |
          cd services/account-service
          ./mvnw test -Dspring.profiles.active=test

      - name: Test Transaction Service
        run: |
          cd services/transaction-service
          ./mvnw test -Dspring.profiles.active=test

      - name: Test Notification Service
        run: |
          cd services/notification-service
          ./mvnw test -Dspring.profiles.active=test

      - name: Build all services
        run: |
          cd services/account-service && ./mvnw package -DskipTests
          cd ../../services/transaction-service && ./mvnw package -DskipTests
          cd ../../services/notification-service && ./mvnw package -DskipTests
          cd ../../services/api-gateway && ./mvnw package -DskipTests

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-services
          path: services/*/target/surefire-reports/
          retention-days: 7

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: |
          chmod +x services/account-service/mvnw
          chmod +x services/transaction-service/mvnw
          chmod +x services/notification-service/mvnw
          chmod +x services/api-gateway/mvnw

      - name: Verify all modules compile
        run: |
          for service in account-service transaction-service notification-service api-gateway; do
            echo "Verifying $service..."
            cd services/$service && ./mvnw verify -DskipTests && cd ../..
          done
